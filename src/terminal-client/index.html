<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posse Terminal</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3.5' fill='%230a0e12'/%3E%3Cpath d='M4 4.5l3 3.5-3 3.5' stroke='%233fb950' stroke-width='1.7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='10' cy='8' r='1.1' fill='%2356d364'/%3E%3Ccircle cx='12.6' cy='8' r='1.1' fill='%232ea043'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-shell">
    <aside id="session-rail">
      <div class="rail-header">
        <div>
          <div class="app-title">Posse</div>
          <div id="daemon-status" class="daemon-status">Connecting</div>
        </div>
        <div class="rail-header-actions">
          <select id="theme-select" class="icon-select" title="Color theme (pick by mood)"></select>
          <button id="restart-daemon-btn" class="ghost-btn" type="button" title="Restart daemon (sessions are saved as resumable)">Restart daemon</button>
          <button id="refresh-btn" class="icon-btn" title="Refresh sessions">↻</button>
        </div>
      </div>

      <form id="new-session-form" class="new-session-form">
        <input id="cwd-input" class="field" type="text" autocomplete="off" placeholder="Working directory" />
        <select id="preset-select" class="field">
          <option value="">Empty shell</option>
          <option value="claude --dangerously-skip-permissions">Claude full auto</option>
          <option value="codex -c sandbox_mode=&quot;danger-full-access&quot; -c approval=&quot;never&quot; -c network=&quot;enabled&quot;">Codex full auto</option>
          <option value="copilot --allow-all --autopilot">Copilot full auto</option>
          <option value="devin --permission-mode bypass">Devin full auto</option>
        </select>
        <button class="primary-btn" type="submit">New Terminal</button>
      </form>

      <div id="session-list" class="session-list"></div>
    </aside>

    <main id="workspace">
      <header id="workspace-header">
        <div>
          <div id="active-title" class="active-title">No session</div>
          <div id="active-meta" class="active-meta">Create or select a terminal</div>
        </div>
        <div class="workspace-actions">
          <button id="rename-btn" class="secondary-btn" type="button" disabled>Rename</button>
          <button id="close-btn" class="danger-btn" type="button" disabled>Close</button>
        </div>
      </header>

      <section id="terminal-stage">
        <div id="empty-state" class="empty-state">
          <div class="empty-title">No terminal selected</div>
          <div class="empty-copy">Active daemon sessions appear in the rail. This client keeps working while the Posse app restarts.</div>
        </div>
      </section>
    </main>
  </div>
  <div id="rename-overlay" class="modal-overlay" hidden>
    <form id="rename-dialog" class="modal-dialog">
      <div class="modal-title">Rename session</div>
      <input id="rename-input" class="field" type="text" autocomplete="off" />
      <div class="modal-actions">
        <button id="rename-cancel-btn" type="button" class="secondary-btn">Cancel</button>
        <button type="submit" class="primary-btn">Save</button>
      </div>
    </form>
  </div>
  <script src="app.js"></script>
</body>
</html>
